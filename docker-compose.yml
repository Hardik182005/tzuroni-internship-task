version: '3.8'

services:
  backend:
    build: .
    container_name: weather_agent_backend
    ports:
      - "8000:8000"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:////app/weather_trading.db
    env_file:
      - .env
    command: uvicorn app.database.connection:app --host 0.0.0.0 --port 8000

  dashboard:
    build: .
    container_name: weather_agent_dashboard
    ports:
      - "8501:8501"
    volumes:
      - .:/app
    environment:
      - DATABASE_URL=sqlite:////app/weather_trading.db
    env_file:
      - .env
    command: streamlit run app/dashboard/main.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - backend
